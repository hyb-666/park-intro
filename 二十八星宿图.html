<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>二十八星宿图</title>
<style>
/* 全局重置 */
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"Microsoft YaHei",sans-serif;
  background:#f6f1e8;
  color:#333;
  height: 100vh;
  overflow: hidden;
}

/* 标题固定容器 - 顶部悬浮 */
.header-fixed{
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: #fff;
  padding: 12px 15px;
  border-bottom: 2px solid #f0e4d2;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  z-index: 999;
}
.header-fixed h1{
  text-align:center;
  color:#8c5a3b;
  font-size: 20px;
  font-weight: bold;
}

/* 正文滚动容器 - 全屏可用 */
.content-scroll{
  position: fixed;
  top: 60px;
  left: 0;
  right: 0;
  bottom: 0;
  padding: 15px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.content-scroll p{
  margin-bottom: 16px;
  text-indent: 2em;
  line-height: 1.8;
  font-size: 16px;
}
.content-scroll .section{
  margin-top: 8px;
  margin-bottom: 8px;
  font-weight: bold;
  color:#8c5a3b;
}
</style>
</head>
<body>

<!-- 音频：二十八星宿图.MP3 -->
<audio class="audio-player" id="audio" controls autoplay loop>
  <source src="https://hyb-666.github.io/park-intro/二十八星宿图.MP3" type="audio/mpeg">
  你的浏览器不支持音频播放
</audio>

<!-- 固定标题：二十八星宿图 -->
<div class="header-fixed">
  <h1>二十八星宿图</h1>
</div>

<!-- 正文内容 -->
<div class="content-scroll" id="readText">
<p>二十八星宿是古人把黄道附近的星空分成 28 个星区，用来观测日月星辰、定方位和节气，又归为东方青龙、西方白虎、南方朱雀、北方玄武四象，每象七宿，后来被神话成天上星君，出现在《西游记》《封神演义》等故事里，也用于风水和道教文化。</p>

<p class="section">二十八宿分别是：</p>

<p>东方青龙七宿：角、亢、氐、房、心、尾、箕</p>
<p>北方玄武七宿：斗、牛、女、虚、危、室、壁</p>
<p>西方白虎七宿：奎、娄、胃、昴、毕、觜、参</p>
<p>南方朱雀七宿：井、鬼、柳、星、张、翼、轸</p>
</div>

<script>
// 音频自动播放适配
window.onload = function() {
  const audio = document.getElementById('audio');
  document.addEventListener('touchstart', () => {
    audio.play().catch(err => console.log('播放音频:', err));
  }, { once: true });
  setTimeout(() => {
    audio.play().catch(err => console.log('自动播放:', err));
  }, 500);
};
</script>
</body>
</html>
