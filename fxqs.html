<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>风雪千山</title>
<style>
/* 全局重置 */
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"Microsoft YaHei",sans-serif;
  background:#f6f1e8;
  color:#333;
  height: 100vh;
  overflow: hidden;
}

/* 标题固定顶部 */
.header-fixed{
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: #fff;
  padding: 12px 15px;
  border-bottom: 2px solid #f0e4d2;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  z-index: 999;
}
.header-fixed h1{
  text-align:center;
  color:#8c5a3b;
  font-size: 20px;
  font-weight: bold;
}

/* 正文可滚动 */
.content-scroll{
  position: fixed;
  top: 60px;
  left: 0;
  right: 0;
  bottom: 0;
  padding: 15px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.content-scroll p{
  margin-bottom: 16px;
  text-indent: 2em;
  line-height: 1.8;
  font-size: 16px;
}

/* 音频隐藏 */
.audio-player{
  display: none;
}
</style>
</head>
<body>

<!-- 音频：风雪千山 -->
<audio class="audio-player" id="audio" autoplay loop>
  <source src="https://hyb-666.github.io/park-intro/风雪千山.MP3" type="audio/mpeg">
  您的浏览器不支持音频播放
</audio>

<!-- 固定标题 -->
<div class="header-fixed">
  <h1>风雪千山</h1>
</div>

<!-- 正文内容 -->
<div class="content-scroll">
<p>“风雪千山”四字取自元朝张可久的殿前欢·客中，大家耳熟能详的“半纸功名”亦是来自该词曲。</p>
<p>它传达了一种深刻的人生哲理，即为了实现个人的抱负和理想，人们往往需要历经千辛万苦，克服重重困难，甚至要面对生活的风霜雨雪。</p>
<p>这种表达不仅是对追求者坚韧不拔精神的赞美，也是对那些为了理想而不懈努力的人们的鼓励。</p>
</div>

<script>
// 音频自动播放（修复版）
window.onload = function() {
  const audio = document.getElementById('audio');
  
  // 触摸屏幕即播放（兼容所有手机）
  document.addEventListener('touchstart', function(){
    audio.play().catch(e=>{});
  }, { once:true });

  // 延迟自动播放
  setTimeout(()=>{
    audio.play().catch(e=>{});
  },600);
};
</script>
</body>
</html>
