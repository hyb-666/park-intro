<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>水南赋</title>
<style>
/* 全局重置 */
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"Microsoft YaHei",sans-serif;
  background:#f6f1e8;
  color:#333;
  height: 100vh;
  overflow: hidden;
}

/* 标题固定容器 - 顶部悬浮 */
.header-fixed{
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: #fff;
  padding: 12px 15px;
  border-bottom: 2px solid #f0e4d2;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  z-index: 999;
}
.header-fixed h1{
  text-align:center;
  color:#8c5a3b;
  font-size: 20px;
  font-weight: bold;
}

/* 正文滚动容器 - 全屏可用 */
.content-scroll{
  position: fixed;
  top: 60px;
  left: 0;
  right: 0;
  bottom: 0;
  padding: 15px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.content-scroll p{
  margin-bottom: 16px;
  text-indent: 2em;
  line-height: 1.8;
  font-size: 16px;
}

/* 音频控件（隐藏，自动播放） */
.audio-player{
  display: none;
}
</style>
</head>
<body>

<!-- 音频：水南赋 -->
<audio class="audio-player" id="audio" controls autoplay loop>
  <source src="https://hyb-666.github.io/park-intro/水南赋.MP3" type="audio/mpeg">
  你的浏览器不支持音频播放
</audio>

<!-- 固定标题：水南赋 -->
<div class="header-fixed">
  <h1>水南赋</h1>
</div>

<!-- 正文内容 -->
<div class="content-scroll" id="readText">
<p>“水南赋”，该文用笔行云流水、舒畅自如，言简意赅的概括了我们水南的古往今来。</p>
</div>

<script>
// 音频自动播放适配
window.onload = function() {
  const audio = document.getElementById('audio');
  document.addEventListener('touchstart', () => {
    audio.play().catch(err => console.log('播放音频:', err));
  }, { once: true });
  setTimeout(() => {
    audio.play().catch(err => console.log('自动播放:', err));
  }, 500);
};
</script>
</body>
</html>
